<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marco — Command Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0e14;--surface:#131620;--card:#1a1d2a;--card-h:#1f2336;--b:#252836;--bl:#2e3347;--text:#e8e9f0;--muted:#6b7094;--dim:#3d4260;--gold:#d4a853;--goldd:#d4a85322;--blue:#4f8ef7;--blued:#4f8ef718;--purple:#9b72f0;--purpled:#9b72f018;--green:#4caf87;--greend:#4caf8718;--red:#f07272;--redd:#f0727218;--amber:#f0a050;--amberd:#f0a05018}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:54px;border-bottom:1px solid var(--b);background:var(--surface);position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:26px;height:26px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--bg);letter-spacing:-.02em}
.logo-text{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.01em}
.header-right{display:flex;align-items:center;gap:16px}
#clock{font-size:12px;color:var(--muted);font-weight:400}
.sync-status{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;letter-spacing:.02em}
.sync-ok{color:var(--green);background:var(--greend)}
.sync-loading{color:var(--amber);background:var(--amberd)}
.sync-err{color:var(--red);background:var(--redd)}
.tabs{display:flex;gap:2px;padding:0 24px;border-bottom:1px solid var(--b);background:var(--surface)}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--gold)}
.board{display:flex;gap:16px;padding:20px 24px;overflow-x:auto;min-height:calc(100vh - 107px);align-items:flex-start}
.col{flex:0 0 300px;display:flex;flex-direction:column;gap:0}
.col-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);border:1px solid var(--b);border-radius:10px 10px 0 0;border-bottom:none}
.col-meta{display:flex;align-items:center;gap:8px}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.col-name{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.col-n{font-size:11px;font-weight:600;color:var(--muted);background:var(--b);padding:1px 6px;border-radius:10px}
.add-btn{width:22px;height:22px;border-radius:6px;border:none;background:var(--b);color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.add-btn:hover{background:var(--bl);color:var(--text)}
.col-body{display:flex;flex-direction:column;gap:8px;padding:10px;background:var(--surface);border:1px solid var(--b);border-radius:0 0 10px 10px;min-height:60px;transition:background .15s}
.col-body.drag-over{background:var(--blued);border-color:var(--blue)}
.empty{font-size:12px;color:var(--dim);text-align:center;padding:16px 0;font-style:italic}
.card{background:var(--card);border:1px solid var(--b);border-radius:8px;padding:11px 12px;cursor:pointer;border-left:3px solid;transition:all .15s;position:relative}
.card:hover{background:var(--card-h);border-color:var(--bl);transform:translateY(-1px)}
.card:hover .card-actions{opacity:1}
.card-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:7px;padding-right:60px}
.card-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.btn-complete{width:24px;height:24px;border-radius:6px;border:none;background:var(--greend);color:var(--green);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-weight:700}
.btn-complete:hover{background:var(--green);color:var(--bg)}
.btn-cancel{width:24px;height:24px;border-radius:6px;border:none;background:var(--b);color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-weight:700}
.btn-cancel:hover{background:var(--dim);color:var(--text)}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;letter-spacing:.02em}
.p-marco{background:var(--goldd);color:var(--gold)}
.p-claude{background:var(--purpled);color:var(--purple)}
.p-proj{background:var(--blued);color:var(--blue)}
.card-notes{font-size:11px;color:var(--muted);line-height:1.45;margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.dragging{opacity:.4;transform:scale(.98)}

/* Archive tab */
.archive-view{padding:20px 24px;max-width:900px}
.archive-section{margin-bottom:28px}
.archive-section-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.archive-section-title::after{content:'';flex:1;height:1px;background:var(--b)}
.archive-item{background:var(--card);border:1px solid var(--b);border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;opacity:.75}
.archive-item:hover{opacity:1}
.archive-item-left{flex:1;min-width:0}
.archive-item-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:6px;text-decoration:line-through;color:var(--muted)}
.archive-item-tags{display:flex;flex-wrap:wrap;gap:5px}
.archive-item-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.badge-completed{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--greend);color:var(--green);letter-spacing:.04em;text-transform:uppercase}
.badge-cancelled{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--b);color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.archive-date{font-size:11px;color:var(--dim)}
.archive-empty{font-size:13px;color:var(--muted);padding:40px 0;text-align:center;font-style:italic}

/* Projects board */
.proj-card{background:var(--card);border:1px solid var(--b);border-radius:8px;padding:11px 12px;cursor:pointer;transition:all .15s}
.proj-card:hover{background:var(--card-h);border-color:var(--bl);transform:translateY(-1px)}
.proj-name{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:4px}
.proj-desc{font-size:11px;color:var(--muted);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--bl);border-radius:14px;padding:24px;width:460px;max-width:calc(100vw - 32px);max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:15px;font-weight:600}
.modal-close{width:28px;height:28px;border-radius:8px;border:none;background:var(--b);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.modal-close:hover{background:var(--bl);color:var(--text)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--card);border:1px solid var(--b);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
.field textarea{resize:vertical;min-height:80px;line-height:1.5}
.field select{appearance:none;cursor:pointer}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-foot{display:flex;align-items:center;justify-content:space-between;margin-top:20px;gap:10px}
.btn{padding:8px 18px;border-radius:8px;border:none;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--gold);color:var(--bg)}
.btn-primary:hover{opacity:.9}
.btn-ghost{background:var(--b);color:var(--muted)}
.btn-ghost:hover{background:var(--bl);color:var(--text)}
.btn-danger{background:var(--redd);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}

/* Archive confirm modal */
.archive-modal{background:var(--surface);border:1px solid var(--bl);border-radius:14px;padding:24px;width:380px;max-width:calc(100vw - 32px)}
.archive-modal-title{font-size:15px;font-weight:600;margin-bottom:8px}
.archive-modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.archive-modal-btns{display:flex;gap:10px;justify-content:flex-end}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark">MG</div>
    <span class="logo-text">Command Centre</span>
  </div>
  <div class="header-right">
    <span id="clock"></span>
    <span id="syncStatus" class="sync-status sync-loading">loading...</span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="ttasks" onclick="switchTab('tasks')">Tasks</div>
  <div class="tab" id="tprojects" onclick="switchTab('projects')">Projects</div>
  <div class="tab" id="tarchive" onclick="switchTab('archive')">Archive</div>
</div>

<div id="board" class="board"></div>

<!-- Task/Project modal -->
<div class="ov" id="ov" onclick="handleOv(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="mt">New Task</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="mb"></div>
    <div class="modal-foot">
      <button class="btn btn-danger" id="bdel" onclick="delItem()" style="display:none">Delete</button>
      <div style="display:flex;gap:10px;margin-left:auto">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveItem()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Archive confirm modal -->
<div class="ov" id="archiveOv" onclick="handleArchiveOv(event)">
  <div class="archive-modal">
    <div class="archive-modal-title" id="archiveTitle">Complete this task?</div>
    <div class="archive-modal-sub" id="archiveSub">This will move the task to the Archive.</div>
    <div class="archive-modal-btns">
      <button class="btn btn-ghost" onclick="closeArchiveModal()">Back</button>
      <button class="btn btn-primary" id="archiveConfirmBtn" onclick="confirmArchive()">Confirm</button>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://lvfyiebkvcfstubuovqt.supabase.co';
var SUPABASE_KEY = 'sb_publishable_AeyteXvqKEh8ZkWFu6BZpw_fAXbhA5c';

async function sbFetch(path, opts) {
  opts = opts || {};
  var headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': opts.prefer || 'return=representation'
  };
  if (opts.headers) Object.keys(opts.headers).forEach(function(k){headers[k]=opts.headers[k];});
  var res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method: opts.method || 'GET', headers: headers, body: opts.body
  });
  if (!res.ok) { var err = await res.text(); throw new Error(err); }
  var text = await res.text();
  return text ? JSON.parse(text) : [];
}

var sb = {
  get: function(t,q){ return sbFetch(t+'?'+(q||'')+'&order=created_at.asc'); },
  insert: function(t,d){ return sbFetch(t,{method:'POST',body:JSON.stringify(d)}); },
  update: function(t,id,d){ return sbFetch(t+'?id=eq.'+encodeURIComponent(id),{method:'PATCH',body:JSON.stringify(d)}); },
  del: function(t,id){ return sbFetch(t+'?id=eq.'+encodeURIComponent(id),{method:'DELETE',prefer:'return=minimal'}); }
};

var CC = {
  todo:'#4f8ef7',inprogress:'#f0a050',waiting:'#f07272',
  priority:'#d4a853',background:'#9b72f0',parked:'#6b7094'
};

// Board columns — Done and Dead removed
var TC = [{id:'todo',l:'To Do'},{id:'inprogress',l:'In Progress'},{id:'waiting',l:'Waiting'}];
var PC = [{id:'priority',l:'Priority'},{id:'background',l:'Background'},{id:'parked',l:'Parked'}];

var tab = 'tasks', tasks = [], archivedTasks = [], projects = [], eid = null, ecol = null;
var pendingArchiveId = null, pendingArchiveReason = null;

function updateClock() {
  var d = new Date();
  var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clock').textContent = days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()];
}
updateClock();

function setSyncStatus(state, msg) {
  var el = document.getElementById('syncStatus');
  el.className = 'sync-status sync-' + state;
  el.textContent = msg;
}

async function load() {
  setSyncStatus('loading', 'loading...');
  try {
    var r = await Promise.all([
      sb.get('tasks', 'archived_at=is.null'),
      sb.get('projects'),
      sbFetch('tasks?archived_at=not.is.null&order=archived_at.desc')
    ]);
    tasks = r[0];
    projects = r[1];
    archivedTasks = r[2];
    setSyncStatus('ok', '\u25CF live');
    render();
  } catch(e) {
    setSyncStatus('err', '\u2715 offline');
    console.error('Load error:', e);
  }
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  var boardEl = document.getElementById('board');

  if (tab === 'archive') {
    boardEl.className = 'archive-view';
    renderArchive(boardEl);
    return;
  }

  boardEl.className = 'board';
  var cols = tab === 'tasks' ? TC : PC;
  var items = tab === 'tasks' ? tasks : projects;
  var html = '';

  for (var i = 0; i < cols.length; i++) {
    var col = cols[i];
    var c = CC[col.id] || '#6b7094';
    var cards = items.filter(function(x){ return x.column === col.id; });
    var cardsHtml = cards.length === 0
      ? '<div class="empty">empty</div>'
      : cards.map(function(card){ return renderCard(card, col.id, c); }).join('');

    html += '<div class="col">'
      + '<div class="col-head">'
      + '<div class="col-meta">'
      + '<div class="col-dot" style="background:'+c+'"></div>'
      + '<span class="col-name">'+col.l+'</span>'
      + '<span class="col-n">'+cards.length+'</span>'
      + '</div>'
      + (tab !== 'archive' ? '<button class="add-btn" onclick="openNew(\''+col.id+'\')">+</button>' : '')
      + '</div>'
      + '<div class="col-body" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="drop(event,\''+col.id+'\')">'
      + cardsHtml
      + '</div></div>';
  }
  boardEl.innerHTML = html;
}

function renderArchive(el) {
  if (archivedTasks.length === 0) {
    el.innerHTML = '<div class="archive-empty">No archived tasks yet. Completed and cancelled tasks will appear here.</div>';
    return;
  }

  var completed = archivedTasks.filter(function(t){ return t.archive_reason === 'completed'; });
  var cancelled = archivedTasks.filter(function(t){ return t.archive_reason === 'cancelled'; });

  var html = '';

  if (completed.length > 0) {
    html += '<div class="archive-section"><div class="archive-section-title">Completed ('+completed.length+')</div>';
    completed.forEach(function(task) {
      html += renderArchiveItem(task);
    });
    html += '</div>';
  }

  if (cancelled.length > 0) {
    html += '<div class="archive-section"><div class="archive-section-title">Cancelled ('+cancelled.length+')</div>';
    cancelled.forEach(function(task) {
      html += renderArchiveItem(task);
    });
    html += '</div>';
  }

  el.innerHTML = html;
}

function renderArchiveItem(task) {
  var proj = projects.find(function(p){ return p.id === task.project; });
  var date = task.archived_at ? new Date(task.archived_at) : null;
  var dateStr = date ? date.toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) : '';
  var badgeClass = task.archive_reason === 'completed' ? 'badge-completed' : 'badge-cancelled';
  var badgeText = task.archive_reason === 'completed' ? '✓ completed' : '✗ cancelled';

  return '<div class="archive-item">'
    + '<div class="archive-item-left">'
    + '<div class="archive-item-title">'+esc(task.title)+'</div>'
    + '<div class="archive-item-tags">'
    + '<span class="pill p-marco">'+esc(task.responsible||'Marco')+'</span>'
    + (proj ? '<span class="pill p-proj">'+esc(proj.name)+'</span>' : '')
    + '</div>'
    + '</div>'
    + '<div class="archive-item-right">'
    + '<span class="'+badgeClass+'">'+badgeText+'</span>'
    + '<span class="archive-date">'+dateStr+'</span>'
    + '</div>'
    + '</div>';
}

function renderCard(card, colId, c) {
  if (tab === 'tasks') {
    var proj = projects.find(function(p){ return p.id === card.project; });
    var ownerClass = card.responsible === 'Claude' ? 'claude' : 'marco';
    return '<div class="card" draggable="true" style="border-left-color:'+c+'" '
      + 'ondragstart="dragStart(event,\''+card.id+'\')" ondragend="dragEnd(event)" '
      + 'onclick="cardClick(event,\''+card.id+'\')">'
      + '<div class="card-actions">'
      + '<button class="btn-complete" title="Complete" onclick="promptArchive(event,\''+card.id+'\',\'completed\')">✓</button>'
      + '<button class="btn-cancel" title="Cancel task" onclick="promptArchive(event,\''+card.id+'\',\'cancelled\')">✗</button>'
      + '</div>'
      + '<div class="card-title">'+esc(card.title)+'</div>'
      + '<div class="tags">'
      + '<span class="pill p-'+ownerClass+'">'+esc(card.responsible||'Marco')+'</span>'
      + (proj ? '<span class="pill p-proj" title="'+esc(proj.name)+'">'+esc(proj.name)+'</span>' : '')
      + '</div>'
      + (card.notes ? '<div class="card-notes">'+esc(card.notes)+'</div>' : '')
      + '</div>';
  } else {
    return '<div class="proj-card" draggable="true" '
      + 'ondragstart="dragStart(event,\''+card.id+'\')" ondragend="dragEnd(event)" '
      + 'onclick="cardClick(event,\''+card.id+'\')">'
      + '<div class="proj-name">'+esc(card.name)+'</div>'
      + (card.description ? '<div class="proj-desc">'+esc(card.description)+'</div>' : '')
      + '</div>';
  }
}

function switchTab(t) {
  tab = t;
  document.getElementById('ttasks').className = 'tab'+(t==='tasks'?' active':'');
  document.getElementById('tprojects').className = 'tab'+(t==='projects'?' active':'');
  document.getElementById('tarchive').className = 'tab'+(t==='archive'?' active':'');
  eid = null;
  render();
}

function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

function openNew(col) {
  eid = null; ecol = col;
  document.getElementById('mt').textContent = tab === 'tasks' ? 'New Task' : 'New Project';
  document.getElementById('bdel').style.display = 'none';
  document.getElementById('mb').innerHTML = tab === 'tasks' ? taskForm(null,col) : projectForm(null,col);
  document.getElementById('ov').style.display = 'flex';
}

function openEdit(id) {
  eid = id;
  var arr = tab === 'tasks' ? tasks : projects;
  var item = arr.find(function(x){ return x.id === id; });
  if (!item) return;
  ecol = item.column;
  document.getElementById('mt').textContent = tab === 'tasks' ? 'Edit Task' : 'Edit Project';
  document.getElementById('bdel').style.display = 'block';
  document.getElementById('mb').innerHTML = tab === 'tasks' ? taskForm(item) : projectForm(item);
  document.getElementById('ov').style.display = 'flex';
}

function taskForm(t, col) {
  var projOpts = projects.map(function(p){
    return '<option value="'+p.id+'"'+(t&&t.project===p.id?' selected':'')+'>'+esc(p.name)+'</option>';
  }).join('');
  var statusOpts = TC.map(function(c){
    return '<option value="'+c.id+'"'+((t?t.column:col)===c.id?' selected':'')+'>'+c.l+'</option>';
  }).join('');
  return '<div class="field"><label>Title</label><input id="fi-title" value="'+(t?esc(t.title):'')+'" placeholder="What needs to be done?"></div>'
    + '<div class="row">'
    + '<div class="field"><label>Project</label><select id="fi-project"><option value="">-- none --</option>'+projOpts+'</select></div>'
    + '<div class="field"><label>Owner</label><select id="fi-responsible">'
    + '<option value="Marco"'+(!t||t.responsible==='Marco'?' selected':'')+'>Marco</option>'
    + '<option value="Claude"'+(t&&t.responsible==='Claude'?' selected':'')+'>Claude</option>'
    + '</select></div></div>'
    + '<div class="field"><label>Status</label><select id="fi-column">'+statusOpts+'</select></div>'
    + '<div class="field"><label>Notes</label><textarea id="fi-notes" placeholder="Add context...">'+(t?esc(t.notes||''):'')+' </textarea></div>';
}

function projectForm(p, col) {
  var statusOpts = PC.map(function(c){
    return '<option value="'+c.id+'"'+((p?p.column:col)===c.id?' selected':'')+'>'+c.l+'</option>';
  }).join('');
  return '<div class="field"><label>Name</label><input id="fi-name" value="'+(p?esc(p.name):'')+'" placeholder="Project name"></div>'
    + '<div class="field"><label>Description</label><textarea id="fi-description" placeholder="What is this project about?">'+(p?esc(p.description||''):'')+' </textarea></div>'
    + '<div class="field"><label>Status</label><select id="fi-column">'+statusOpts+'</select></div>';
}

function closeModal() { document.getElementById('ov').style.display='none'; eid=null; }
function handleOv(e) { if(e.target===document.getElementById('ov')) closeModal(); }

function promptArchive(e, id, reason) {
  e.stopPropagation();
  pendingArchiveId = id;
  pendingArchiveReason = reason;
  var isComplete = reason === 'completed';
  document.getElementById('archiveTitle').textContent = isComplete ? 'Complete this task?' : 'Cancel this task?';
  document.getElementById('archiveSub').textContent = isComplete
    ? 'This will move the task to the Archive as Completed.'
    : 'This will move the task to the Archive as Cancelled.';
  var btn = document.getElementById('archiveConfirmBtn');
  btn.textContent = isComplete ? '✓ Mark Complete' : '✗ Cancel Task';
  btn.style.background = isComplete ? 'var(--green)' : 'var(--dim)';
  btn.style.color = isComplete ? 'var(--bg)' : 'var(--text)';
  document.getElementById('archiveOv').style.display = 'flex';
}

function closeArchiveModal() {
  document.getElementById('archiveOv').style.display = 'none';
  pendingArchiveId = null;
  pendingArchiveReason = null;
}

function handleArchiveOv(e) { if(e.target===document.getElementById('archiveOv')) closeArchiveModal(); }

async function confirmArchive() {
  if (!pendingArchiveId) return;
  setSyncStatus('loading', 'saving...');
  closeArchiveModal();
  try {
    var now = new Date().toISOString();
    await sb.update('tasks', pendingArchiveId, {
      archived_at: now,
      archive_reason: pendingArchiveReason
    });
    var task = tasks.find(function(t){ return t.id === pendingArchiveId; });
    if (task) {
      task.archived_at = now;
      task.archive_reason = pendingArchiveReason;
      archivedTasks.unshift(task);
      tasks = tasks.filter(function(t){ return t.id !== pendingArchiveId; });
    }
    pendingArchiveId = null;
    pendingArchiveReason = null;
    setSyncStatus('ok', '\u25CF live');
    render();
  } catch(e) {
    setSyncStatus('err', '\u2715 error');
    console.error(e);
  }
}

async function saveItem() {
  setSyncStatus('loading', 'saving...');
  try {
    if (tab === 'tasks') {
      var data = {
        title: document.getElementById('fi-title').value.trim(),
        project: document.getElementById('fi-project').value || null,
        responsible: document.getElementById('fi-responsible').value,
        column: document.getElementById('fi-column').value,
        notes: document.getElementById('fi-notes').value.trim() || null
      };
      if (!data.title) { alert('Title is required'); return; }
      if (eid) {
        await sb.update('tasks', eid, data);
        var idx = tasks.findIndex(function(t){ return t.id===eid; });
        if (idx > -1) tasks[idx] = Object.assign({}, tasks[idx], data);
      } else {
        data.id = uid();
        var created = await sb.insert('tasks', data);
        tasks.push(created[0] || data);
      }
    } else {
      var pdata = {
        name: document.getElementById('fi-name').value.trim(),
        description: document.getElementById('fi-description').value.trim() || null,
        column: document.getElementById('fi-column').value
      };
      if (!pdata.name) { alert('Name is required'); return; }
      if (eid) {
        await sb.update('projects', eid, pdata);
        var pidx = projects.findIndex(function(p){ return p.id===eid; });
        if (pidx > -1) projects[pidx] = Object.assign({}, projects[pidx], pdata);
      } else {
        pdata.id = uid();
        var pcreated = await sb.insert('projects', pdata);
        projects.push(pcreated[0] || pdata);
      }
    }
    setSyncStatus('ok', '\u25CF live');
    closeModal();
    render();
  } catch(e) {
    setSyncStatus('err', '\u2715 error');
    alert('Save failed: '+e.message);
  }
}

async function delItem() {
  if (!eid) return;
  if (!confirm('Permanently delete this item? This cannot be undone.')) return;
  setSyncStatus('loading', 'deleting...');
  try {
    if (tab === 'tasks') {
      await sb.del('tasks', eid);
      tasks = tasks.filter(function(t){ return t.id!==eid; });
    } else {
      await sb.del('projects', eid);
      projects = projects.filter(function(p){ return p.id!==eid; });
    }
    setSyncStatus('ok', '\u25CF live');
    closeModal();
    render();
  } catch(e) {
    setSyncStatus('err', '\u2715 error');
    alert('Delete failed: '+e.message);
  }
}

var dragId = null, didDrag = false;
function dragStart(e,id){ dragId=id; didDrag=true; e.dataTransfer.effectAllowed='move'; e.target.classList.add('dragging'); }
function dragEnd(e){ e.target.classList.remove('dragging'); }
function dragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect='move'; e.currentTarget.classList.add('drag-over'); }
function dragLeave(e){ e.currentTarget.classList.remove('drag-over'); }

async function drop(e, colId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragId) return;
  var arr = tab==='tasks'?tasks:projects;
  var item = arr.find(function(x){ return x.id===dragId; });
  var id = dragId; dragId = null;
  if (!item || item.column===colId) return;
  setSyncStatus('loading', 'saving...');
  try {
    await sb.update(tab==='tasks'?'tasks':'projects', id, {column:colId});
    item.column = colId;
    setSyncStatus('ok', '\u25CF live');
    render();
  } catch(ex) {
    setSyncStatus('err', '\u2715 error');
  }
}

function cardClick(e, id) {
  if (didDrag) { didDrag=false; return; }
  openEdit(id);
}

load();
</script>
</body>
</html>
