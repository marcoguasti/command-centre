<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marco — Command Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0e14;--surface:#131620;--card:#1a1d2a;--card-h:#1f2336;--b:#252836;--bl:#2e3347;--text:#e8e9f0;--muted:#6b7094;--dim:#3d4260;--gold:#d4a853;--goldd:#d4a85322;--blue:#4f8ef7;--blued:#4f8ef718;--purple:#9b72f0;--purpled:#9b72f018;--green:#4caf87;--greend:#4caf8718;--red:#f07272;--redd:#f0727218;--amber:#f0a050;--amberd:#f0a05018}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:54px;border-bottom:1px solid var(--b);background:var(--surface);position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:26px;height:26px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--bg);letter-spacing:-.02em}
.logo-text{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.02em}
.logo-date{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-left:10px;padding-left:10px;border-left:1px solid var(--b)}
.sync-status{font-size:10px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:4px;margin-left:10px;transition:all .3s}
.sync-ok{background:var(--greend);color:var(--green);border:1px solid #4caf8730}
.sync-err{background:var(--redd);color:var(--red);border:1px solid #f0727230}
.sync-loading{background:var(--amberd);color:var(--amber);border:1px solid #f0a05030}
.tabs{display:flex;background:var(--card);border-radius:8px;padding:3px;gap:2px;border:1px solid var(--b)}
.tab{padding:5px 16px;border-radius:6px;border:none;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;transition:all .15s;letter-spacing:.01em}
.tab.active{background:var(--gold);color:var(--bg)}
.tab:not(.active):hover{color:var(--text)}
.board{display:flex;gap:14px;padding:20px 24px 60px;overflow-x:auto;align-items:flex-start;min-height:calc(100vh - 54px)}
.col{flex:0 0 255px;display:flex;flex-direction:column}
.col-head{display:flex;align-items:center;justify-content:space-between;padding:0 2px 10px}
.col-meta{display:flex;align-items:center;gap:7px}
.col-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.col-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);font-family:'JetBrains Mono',monospace}
.col-n{font-size:10px;color:var(--dim);background:var(--card);border:1px solid var(--b);border-radius:10px;padding:1px 7px;font-family:'JetBrains Mono',monospace}
.add-btn{width:22px;height:22px;border-radius:5px;background:transparent;border:1px solid var(--b);color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.add-btn:hover{background:var(--gold);border-color:var(--gold);color:var(--bg)}
.col-body{display:flex;flex-direction:column;gap:8px;min-height:80px}
.card{background:var(--card);border:1px solid var(--b);border-radius:10px;padding:12px 13px;cursor:pointer;transition:all .15s;border-left-width:3px;animation:ci .18s ease}
@keyframes ci{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card:hover{background:var(--card-h);border-color:var(--bl);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.35)}
.card-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:8px}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;letter-spacing:.02em}
.p-marco{background:var(--goldd);color:var(--gold);border:1px solid #d4a85335}
.p-claude{background:var(--purpled);color:var(--purple);border:1px solid #9b72f030}
.p-proj{background:var(--blued);color:var(--blue);border:1px solid #4f8ef728;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-notes{font-size:11px;color:var(--muted);margin-top:7px;line-height:1.5;font-style:italic}
.proj-card{background:var(--card);border:1px solid var(--b);border-left:3px solid var(--gold);border-radius:10px;padding:12px 13px;cursor:pointer;transition:all .15s;animation:ci .18s ease}
.proj-card:hover{background:var(--card-h);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.35)}
.proj-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px;line-height:1.3}
.proj-desc{font-size:11px;color:var(--muted);line-height:1.5}
.empty{border:1px dashed var(--b);border-radius:10px;padding:18px;text-align:center;font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;letter-spacing:.04em}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px);animation:fo .15s ease}
@keyframes fo{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--bl);border-radius:14px;padding:22px;width:420px;max-width:92vw;animation:su .18s ease;box-shadow:0 24px 80px rgba(0,0,0,.65)}
@keyframes su{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-t{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.02em}
.modal-x{width:26px;height:26px;background:var(--card);border:1px solid var(--b);border-radius:6px;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.modal-x:hover{background:var(--redd);color:var(--red);border-color:#f0727235}
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-family:'JetBrains Mono',monospace}
input,select,textarea{width:100%;background:var(--card);border:1px solid var(--b);border-radius:8px;padding:9px 11px;font-size:13px;color:var(--text);font-family:'Outfit',sans-serif;outline:none;transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder,textarea::placeholder{color:var(--dim)}
select option{background:var(--surface);color:var(--text)}
textarea{resize:vertical;min-height:68px}
.row{display:flex;gap:10px}
.row .field{flex:1}
.modal-foot{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:16px;border-top:1px solid var(--b)}
.btn{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;font-family:'Outfit',sans-serif;letter-spacing:.02em;transition:all .15s}
.btn-p{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.btn-p:hover{background:#e0b860;transform:translateY(-1px)}
.btn-g{background:transparent;color:var(--muted);border-color:var(--b)}
.btn-g:hover{color:var(--text);border-color:var(--bl)}
.btn-d{background:var(--redd);color:var(--red);border-color:#f0727230}
.btn-d:hover{background:#f0727228}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bl);border-radius:3px}
</style></head><body>
<div class="header"><div class="logo"><div class="logo-mark">MG</div><span class="logo-text">Command Centre</span><span class="logo-date" id="clock"></span><span class="sync-status sync-loading" id="syncStatus">connecting…</span></div><div class="tabs"><button class="tab active" onclick="switchTab('tasks')" id="ttasks">Tasks</button><button class="tab" onclick="switchTab('projects')" id="tprojects">Projects</button></div></div>
<div id="board" class="board"></div>
<div id="ov" class="overlay" style="display:none" onclick="handleOv(event)"><div class="modal" onclick="event.stopPropagation()"><div class="modal-head"><span class="modal-t" id="mt">New Task</span><button class="modal-x" onclick="closeModal()">×</button></div><div id="mb"></div><div class="modal-foot"><div><button class="btn btn-d" id="bdel" onclick="delItem()" style="display:none">Delete</button></div><div style="display:flex;gap:8px"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="saveItem()">Save</button></div></div></div></div>
<script>
const SUPABASE_URL='https://lvfyiebkvcfstubuovqt.supabase.co';
const SUPABASE_KEY='sb_publishable_AeyteXvqKEh8ZkWFu6BZpw_fAXbhA5c';
async function sbFetch(path,opts={}){const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{...opts,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'return=representation',...(opts.headers||{})}});if(!res.ok){const err=await res.text();throw new Error(err);}const text=await res.text();return text?JSON.parse(text):[];}
const sb={get:(t,q='')=>sbFetch(t+'?'+q+'&order=created_at.asc'),insert:(t,d)=>sbFetch(t,{method:'POST',body:JSON.stringify(d)}),update:(t,id,d)=>sbFetch(t+'?id=eq.'+encodeURIComponent(id),{method:'PATCH',body:JSON.stringify(d)}),delete:(t,id)=>sbFetch(t+'?id=eq.'+encodeURIComponent(id),{method:'DELETE',prefer:'return=minimal'})};
const CC={todo:'#4f8ef7',inprogress:'#f0a050',waiting:'#f07272',done:'#4caf87',priority:'#d4a853',background:'#9b72f0',parked:'#6b7094'};
const TC=[{id:'todo',l:'To Do'},{id:'inprogress',l:'In Progress'},{id:'waiting',l:'Waiting'},{id:'done',l:'Done'}];
const PC=[{id:'priority',l:'Priority'},{id:'background',l:'Background'},{id:'parked',l:'Parked'}];
let tab='tasks',tasks=[],projects=[],eid=null,ecol=null;
function updateClock(){const d=new Date();const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];document.getElementById('clock').textContent=days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()];}
updateClock();
function setSyncStatus(state,msg){const el=document.getElementById('syncStatus');el.className='sync-status sync-'+state;el.textContent=msg;}
async function load(){setSyncStatus('loading','loading…');try{[tasks,projects]=await Promise.all([sb.get('tasks'),sb.get('projects')]);setSyncStatus('ok','● live');render();}catch(e){setSyncStatus('err','✕ offline');console.error('Load error:',e);}}
function render(){const cols=tab==='tasks'?TC:PC;const items=tab==='tasks'?tasks:projects;document.getElementById('board').innerHTML=cols.map(col=>{const cards=items.filter(i=>i.column===col.id);const c=CC[col.id]||'#6b7094';return '<div class="col"><div class="col-head"><div class="col-meta"><div class="col-dot" style="background:'+c+'"></div><span class="col-name">'+col.l+'</span><span class="col-n">'+cards.length+'</span></div><button class="add-btn" onclick="openNew(''+col.id+'')">+</button></div><div class="col-body">'+(cards.length?cards.map(card=>renderCard(card,col.id,c)).join(''):'<div class="empty">empty</div>')+'</div></div>';}).join('');}
function renderCard(card,colId,c){if(tab==='tasks'){const proj=projects.find(p=>p.id===card.project);return '<div class="card" style="border-left-color:'+c+'" onclick="openEdit(''+card.id+'')"><div class="card-title">'+esc(card.title)+'</div><div class="tags"><span class="pill p-'+(card.responsible==='Claude'?'claude':'marco')+'">'+esc(card.responsible||'Marco')+'</span>'+(proj?'<span class="pill p-proj" title="'+esc(proj.name)+'">'+esc(proj.name)+'</span>':'')+'</div>'+(card.notes?'<div class="card-notes">'+esc(card.notes)+'</div>':'')+'</div>';}else{return '<div class="proj-card" onclick="openEdit(''+card.id+'')"><div class="proj-name">'+esc(card.name)+'</div>'+(card.description?'<div class="proj-desc">'+esc(card.description)+'</div>':'')+'</div>';}}
function esc(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function switchTab(t){tab=t;document.getElementById('ttasks').className='tab'+(t==='tasks'?' active':'');document.getElementById('tprojects').className='tab'+(t==='projects'?' active':'');eid=null;render();}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function openNew(col){eid=null;ecol=col;document.getElementById('mt').textContent=tab==='tasks'?'New Task':'New Project';document.getElementById('bdel').style.display='none';document.getElementById('mb').innerHTML=tab==='tasks'?taskForm(null,col):projectForm(null,col);document.getElementById('ov').style.display='flex';}
function openEdit(id){eid=id;const item=(tab==='tasks'?tasks:projects).find(i=>i.id===id);if(!item)return;ecol=item.column;document.getElementById('mt').textContent=tab==='tasks'?'Edit Task':'Edit Project';document.getElementById('bdel').style.display='block';document.getElementById('mb').innerHTML=tab==='tasks'?taskForm(item):projectForm(item);document.getElementById('ov').style.display='flex';}
function taskForm(t,col){const projOpts=projects.map(p=>'<option value="'+p.id+'"'+(t&&t.project===p.id?' selected':'')+'>'+esc(p.name)+'</option>').join('');return '<div class="field"><label>Title</label><input id="fi-title" value="'+(t?esc(t.title):'')+'" placeholder="What needs to be done?"></div><div class="row"><div class="field"><label>Project</label><select id="fi-project"><option value="">— none —</option>'+projOpts+'</select></div><div class="field"><label>Owner</label><select id="fi-responsible"><option value="Marco"'+(!t||t.responsible==='Marco'?' selected':'')+'>Marco</option><option value="Claude"'+(t&&t.responsible==='Claude'?' selected':'')+'>Claude</option></select></div></div><div class="field"><label>Status</label><select id="fi-column">'+TC.map(c=>'<option value="'+c.id+'"'+((t?t.column:col)===c.id?' selected':'')+'>'+c.l+'</option>').join('')+'</select></div><div class="field"><label>Notes</label><textarea id="fi-notes" placeholder="Add context…">'+(t?esc(t.notes||''):'')+'</textarea></div>';}
function projectForm(p,col){return '<div class="field"><label>Name</label><input id="fi-name" value="'+(p?esc(p.name):'')+'" placeholder="Project name"></div><div class="field"><label>Description</label><textarea id="fi-description" placeholder="What is this project about?">'+(p?esc(p.description||''):'')+'</textarea></div><div class="field"><label>Status</label><select id="fi-column">'+PC.map(c=>'<option value="'+c.id+'"'+((p?p.column:col)===c.id?' selected':'')+'>'+c.l+'</option>').join('')+'</select></div>';}
function closeModal(){document.getElementById('ov').style.display='none';eid=null;}
function handleOv(e){if(e.target===document.getElementById('ov'))closeModal();}
async function saveItem(){setSyncStatus('loading','saving…');try{if(tab==='tasks'){const data={title:document.getElementById('fi-title').value.trim(),project:document.getElementById('fi-project').value||null,responsible:document.getElementById('fi-responsible').value,column:document.getElementById('fi-column').value,notes:document.getElementById('fi-notes').value.trim()||null};if(!data.title)return alert('Title is required');if(eid){await sb.update('tasks',eid,data);tasks=tasks.map(t=>t.id===eid?{...t,...data}:t);}else{data.id=uid();const[created]=await sb.insert('tasks',data);tasks.push(created||{...data});}}else{const data={name:document.getElementById('fi-name').value.trim(),description:document.getElementById('fi-description').value.trim()||null,column:document.getElementById('fi-column').value};if(!data.name)return alert('Name is required');if(eid){await sb.update('projects',eid,data);projects=projects.map(p=>p.id===eid?{...p,...data}:p);}else{data.id=uid();const[created]=await sb.insert('projects',data);projects.push(created||{...data});}}setSyncStatus('ok','● live');closeModal();render();}catch(e){setSyncStatus('err','✕ error');alert('Save failed: '+e.message);}}
async function delItem(){if(!eid)return;if(!confirm('Delete this item?'))return;setSyncStatus('loading','deleting…');try{if(tab==='tasks'){await sb.delete('tasks',eid);tasks=tasks.filter(t=>t.id!==eid);}else{await sb.delete('projects',eid);projects=projects.filter(p=>p.id!==eid);}setSyncStatus('ok','● live');closeModal();render();}catch(e){setSyncStatus('err','✕ error');alert('Delete failed: '+e.message);}}
load();
</script></body></html>
