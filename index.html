<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marco — Command Centre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0e14;
      --surface: #131620;
      --card: #1a1d2a;
      --card-h: #1f2336;
      --b: #252836;
      --bl: #2e3347;
      --text: #e8e9f0;
      --muted: #6b7094;
      --dim: #3d4260;
      --gold: #d4a853;
      --goldd: #d4a85322;
      --blue: #4f8ef7;
      --blued: #4f8ef718;
      --purple: #9b72f0;
      --purpled: #9b72f018;
      --green: #4caf87;
      --greend: #4caf8718;
      --red: #f07272;
      --redd: #f0727218;
      --amber: #f0a050;
      --amberd: #f0a05018;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* Header */
    header {
      background-color: var(--surface);
      border-bottom: 1px solid var(--dim);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    .view-tabs {
      display: flex;
      gap: 1rem;
    }

    .tab-btn {
      padding: 0.5rem 1rem;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .tab-btn:hover {
      color: var(--text);
    }

    /* Main content */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .tab-content {
      display: none;
      flex: 1;
      overflow: auto;
      padding: 1.5rem;
    }

    .tab-content.active {
      display: flex;
    }

    /* Tasks board */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      flex: 1;
      align-content: start;
    }

    .board-column {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .column-header {
      font-weight: 600;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .column-count {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .task-card, .project-card {
      background-color: var(--card);
      border: 1px solid var(--dim);
      border-radius: 0.5rem;
      padding: 1rem;
      cursor: grab;
      transition: all 0.2s;
      gap: 0.5rem;
      display: flex;
      flex-direction: column;
    }

    .task-card:hover, .project-card:hover {
      background-color: var(--card-h);
      border-color: var(--muted);
    }

    .task-card.dragging {
      opacity: 0.5;
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .task-title {
      font-weight: 500;
      color: var(--text);
      flex: 1;
    }

    .task-badges {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      white-space: nowrap;
    }

    .badge.p1 {
      background-color: var(--redd);
      color: var(--red);
    }

    .badge.p2 {
      background-color: var(--amberd);
      color: var(--amber);
    }

    .badge.p3 {
      display: none;
    }

    .badge.p4 {
      background-color: rgba(107, 112, 148, 0.2);
      color: var(--dim);
    }

    .badge.action {
      background-color: rgba(79, 142, 247, 0.15);
      color: var(--blue);
    }

    .badge.decision {
      background-color: var(--purpled);
      color: var(--purple);
    }

    .badge.waiting_on {
      background-color: var(--amberd);
      color: var(--amber);
    }

    .badge.reference {
      background-color: var(--blued);
      color: var(--blue);
    }

    .task-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .task-project {
      font-size: 0.8rem;
      background-color: var(--b);
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      color: var(--blue);
    }

    .task-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .btn-small {
      padding: 0.35rem 0.6rem;
      font-size: 0.75rem;
      background-color: var(--b);
      border: 1px solid var(--dim);
      color: var(--text);
      border-radius: 0.25rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-small:hover {
      background-color: var(--bl);
      border-color: var(--muted);
    }

    /* Projects board */
    .projects-board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      padding: 1.5rem;
      overflow-y: auto;
    }

    .project-card {
      position: relative;
      cursor: pointer;
    }

    .project-title {
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .project-description {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
      line-height: 1.4;
    }

    .project-badges {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .project-badge {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      background-color: var(--b);
      color: var(--blue);
      border-radius: 0.25rem;
    }

    .project-badge.parent {
      color: var(--gold);
    }

    .project-badge.child {
      color: var(--green);
    }

    /* Archive tab */
    .archive-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .archive-group {
      background-color: var(--card);
      border: 1px solid var(--dim);
      border-radius: 0.5rem;
      padding: 1rem;
    }

    .archive-group-title {
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .archive-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .archive-item {
      background-color: var(--b);
      padding: 0.75rem;
      border-radius: 0.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }

    .archive-item .title {
      flex: 1;
      color: var(--text);
    }

    .archive-item .reason {
      font-size: 0.75rem;
      color: var(--muted);
      background-color: var(--dim);
      padding: 0.25rem 0.5rem;
      border-radius: 0.2rem;
    }

    /* Knowledge tab */
    .knowledge-container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
      height: 100%;
    }

    .graph-section {
      background-color: var(--card);
      border: 1px solid var(--dim);
      border-radius: 0.5rem;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }

    .graph-title {
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    #projectGraph {
      flex: 1;
      border-radius: 0.25rem;
      background-color: var(--surface);
    }

    .session-section {
      background-color: var(--card);
      border: 1px solid var(--dim);
      border-radius: 0.5rem;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .session-title {
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .session-entry {
      background-color: var(--b);
      padding: 0.75rem;
      border-radius: 0.25rem;
      margin-bottom: 0.75rem;
      border-left: 3px solid var(--gold);
    }

    .session-entry .summary {
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .session-entry .meta {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* Detail panel */
    .detail-panel {
      position: fixed;
      right: 0;
      top: 0;
      height: 100vh;
      width: 0;
      background-color: var(--surface);
      border-left: 1px solid var(--dim);
      overflow-y: auto;
      transition: width 0.3s ease;
      z-index: 100;
      padding: 1.5rem;
    }

    .detail-panel.open {
      width: 500px;
    }

    .panel-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
    }

    .panel-close:hover {
      color: var(--text);
    }

    .panel-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
      margin-top: 2rem;
      margin-bottom: 1rem;
    }

    .panel-section {
      margin-bottom: 1.5rem;
    }

    .panel-section-title {
      font-weight: 600;
      color: var(--muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    .decision-item, .question-item, .rule-item {
      background-color: var(--card);
      border: 1px solid var(--dim);
      padding: 0.75rem;
      border-radius: 0.25rem;
      margin-bottom: 0.5rem;
    }

    .decision-item .title {
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .decision-item .status-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.25rem 0.5rem;
      border-radius: 0.2rem;
      background-color: var(--blued);
      color: var(--blue);
    }

    .decision-item .rationale {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .project-tasks {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .project-task-item {
      background-color: var(--card);
      border: 1px solid var(--dim);
      padding: 0.75rem;
      border-radius: 0.25rem;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .project-task-item .title {
      flex: 1;
      color: var(--text);
    }

    .project-task-item .column-badge {
      font-size: 0.7rem;
      background-color: var(--dim);
      color: var(--muted);
      padding: 0.2rem 0.4rem;
      border-radius: 0.2rem;
    }

    /* Modals */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background-color: var(--card);
      border: 1px solid var(--dim);
      border-radius: 0.5rem;
      padding: 2rem;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--text);
      font-size: 0.9rem;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      background-color: var(--b);
      border: 1px solid var(--dim);
      color: var(--text);
      padding: 0.75rem;
      border-radius: 0.25rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--gold);
      background-color: var(--surface);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .btn {
      flex: 1;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 0.25rem;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background-color: var(--gold);
      color: var(--bg);
    }

    .btn-primary:hover {
      background-color: #e8be6a;
    }

    .btn-secondary {
      background-color: var(--dim);
      color: var(--text);
    }

    .btn-secondary:hover {
      background-color: var(--bl);
    }

    .btn-danger {
      background-color: var(--red);
      color: white;
    }

    .btn-danger:hover {
      background-color: #ff8080;
    }

    /* Filters */
    .board-filters {
      background-color: var(--card);
      border-bottom: 1px solid var(--dim);
      padding: 1rem 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .filter-label {
      font-weight: 500;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .filter-select {
      background-color: var(--b);
      border: 1px solid var(--dim);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 0.25rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .filter-select:hover {
      border-color: var(--muted);
    }

    /* Floating action button */
    .fab {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 50px;
      height: 50px;
      background-color: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 50;
    }

    .fab:hover {
      background-color: #e8be6a;
      transform: scale(1.1);
    }

    .fab.hidden {
      display: none;
    }

    /* Utility classes */
    .mt-1 { margin-top: 1rem; }
    .mb-1 { margin-bottom: 1rem; }
    .gap-1 { gap: 1rem; }
  </style>
</head>
<body>
  <header>
    <div class="logo" style="display:flex;align-items:center;gap:10px"><div style="width:26px;height:26px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--bg)">MG</div><span style="font-size:14px;font-weight:600;color:var(--text)">Command Centre</span></div>
    <nav class="view-tabs">
      <button class="tab-btn active" data-tab="tasks">Tasks</button>
      <button class="tab-btn" data-tab="projects">Projects</button>
      <button class="tab-btn" data-tab="knowledge">Knowledge</button>
      <button class="tab-btn" data-tab="archive">Archive</button>
    </nav>
  </header>

  <main>
    <!-- Tasks Tab -->
    <div id="tasks-tab" class="tab-content active">
      <div class="board-filters">
        <label class="filter-label">Filter by project:</label>
        <select id="projectFilter" class="filter-select">
          <option value="">All Projects</option>
        </select>
      </div>
      <div class="board" id="tasksBoard">
        <div class="board-column" data-column="todo">
          <div class="column-header">
            📋 To Do
            <span class="column-count" data-count="todo">0</span>
          </div>
          <div class="column-cards" data-column="todo"></div>
        </div>
        <div class="board-column" data-column="inprogress">
          <div class="column-header">
            ▶️ In Progress
            <span class="column-count" data-count="inprogress">0</span>
          </div>
          <div class="column-cards" data-column="inprogress"></div>
        </div>
        <div class="board-column" data-column="waiting">
          <div class="column-header">
            ⏸️ Waiting
            <span class="column-count" data-count="waiting">0</span>
          </div>
          <div class="column-cards" data-column="waiting"></div>
        </div>
      </div>
    </div>

    <!-- Projects Tab -->
    <div id="projects-tab" class="tab-content">
      <div class="projects-board" id="projectsBoard"></div>
    </div>

    <!-- Knowledge Tab -->
    <div id="knowledge-tab" class="tab-content">
      <div class="knowledge-container">
        <div class="graph-section">
          <div class="graph-title">Project Network</div>
          <canvas id="projectGraph"></canvas>
        </div>
        <div class="session-section">
          <div class="session-title">Session Log</div>
          <div id="sessionLog"></div>
        </div>
      </div>
    </div>

    <!-- Archive Tab -->
    <div id="archive-tab" class="tab-content">
      <div class="archive-section">
        <div class="archive-group">
          <div class="archive-group-title">
            ✓ Completed Tasks
            <span id="completedCount">0</span>
          </div>
          <div id="completedArchive" class="archive-list"></div>
        </div>
        <div class="archive-group">
          <div class="archive-group-title">
            ✗ Cancelled Tasks
            <span id="cancelledCount">0</span>
          </div>
          <div id="cancelledArchive" class="archive-list"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <button class="panel-close" id="panelClose">&times;</button>
    <div id="panelContent"></div>
  </div>

  <!-- Task Modal -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <div class="modal-header" id="taskModalTitle">New Task</div>
      <form id="taskForm">
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" id="taskTitle" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Project</label>
          <select id="taskProject" class="form-select" required>
            <option value="">Select a project</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <select id="taskType" class="form-select" required>
            <option value="action">Action</option>
            <option value="decision">Decision</option>
            <option value="waiting_on">Waiting On</option>
            <option value="reference">Reference</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select id="taskPriority" class="form-select" required>
            <option value="1">P1 - Critical</option>
            <option value="2">P2 - High</option>
            <option value="3" selected>P3 - Medium</option>
            <option value="4">P4 - Low</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Responsible</label>
          <input type="text" id="taskResponsible" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea id="taskNotes" class="form-textarea"></textarea>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Save Task</button>
          <button type="button" class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
          <button type="button" class="btn btn-danger" id="deleteTaskBtn" style="display:none;">Delete</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Project Modal -->
  <div class="modal-overlay" id="projectModal">
    <div class="modal">
      <div class="modal-header" id="projectModalTitle">New Project</div>
      <form id="projectForm">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input type="text" id="projectName" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="projectDescription" class="form-textarea"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Context</label>
          <textarea id="projectContext" class="form-textarea" placeholder="Project context, goals, constraints..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Column</label>
          <select id="projectColumn" class="form-select" required>
            <option value="priority">Priority</option>
            <option value="background">Background</option>
            <option value="parked">Parked</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Parent Project (optional)</label>
          <select id="projectParent" class="form-select">
            <option value="">None</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Save Project</button>
          <button type="button" class="btn btn-secondary" onclick="closeProjectModal()">Cancel</button>
          <button type="button" class="btn btn-danger" id="deleteProjectBtn" style="display:none;">Delete</button>
        </div>
      </form>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab" title="New task">+</button>

  <script>
    // ==================== SUPABASE LAYER ====================
    var SUPABASE_URL = 'https://lvfyiebkvcfstubuovqt.supabase.co';

    async function sbFetch(path, opts) {
      opts = opts || {};
      var headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': opts.prefer || 'return=representation'
      };
      if (opts.headers) {
        Object.keys(opts.headers).forEach(function(k) {
          headers[k] = opts.headers[k];
        });
      }
      var res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
        method: opts.method || 'GET',
        headers: headers,
        body: opts.body
      });
      if (!res.ok) {
        var err = await res.text();
        throw new Error(err);
      }
      var text = await res.text();
      return text ? JSON.parse(text) : [];
    }

    function renderProjectGraph() {
      var canvas = document.getElementById('projectGraph');
      if (!canvas) return;

      var ctx = canvas.getContext('2d');
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;

      // Simple force-directed graph
      var nodes = appState.projects.map(function(p) {
        return {
          id: p.id,
          label: p.name,
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: 0,
          vy: 0
        };
      });

      var edges = appState.projectEdges;

      // Run simulation
      for (var i = 0; i < 100; i++) {
        nodes.forEach(function(node) {
          node.vx = 0;
          node.vy = 0;
        });

        // Repulsion
        nodes.forEach(function(a, i) {
          nodes.forEach(function(b, j) {
            if (i !== j) {
              var dx = a.x - b.x;
              var dy = a.y - b.y;
              var dist = Math.sqrt(dx * dx + dy * dy) + 0.01;
              a.vx += (dx / dist) * 0.5;
              a.vy += (dy / dist) * 0.5;
            }
          });
        });

        // Attraction
        edges.forEach(function(edge) {
          var source = nodes.find(function(n) { return n.id === edge.source_project; });
          var target = nodes.find(function(n) { return n.id === edge.target_project; });

          if (source && target) {
            var dx = target.x - source.x;
            var dy = target.y - source.y;
            var dist = Math.sqrt(dx * dx + dy * dy) + 0.01;
            source.vx += (dx / dist) * 0.1;
            source.vy += (dy / dist) * 0.1;
            target.vx -= (dx / dist) * 0.1;
            target.vy -= (dy / dist) * 0.1;
          }
        });

        // Update positions
        nodes.forEach(function(node) {
          node.x += node.vx;
          node.y += node.vy;
          node.x = Math.max(20, Math.min(canvas.width - 20, node.x));
          node.y = Math.max(20, Math.min(canvas.height - 20, node.y));
        });
      }

      // Draw
      ctx.fillStyle = '#0c0e14';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw edges
      ctx.strokeStyle = '#3d4260';
      ctx.lineWidth = 1;
      edges.forEach(function(edge) {
        var source = nodes.find(function(n) { return n.id === edge.source_project; });
        var target = nodes.find(function(n) { return n.id === edge.target_project; });
        if (source && target) {
          ctx.beginPath();
          ctx.moveTo(source.x, source.y);
          ctx.lineTo(target.x, target.y);
          ctx.stroke();
        }
      });

      // Draw nodes
      nodes.forEach(function(node) {
        ctx.fillStyle = '#d4a853';
        ctx.beginPath();
        ctx.arc(node.x, node.y, 6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#e8e9f0';
        ctx.font = 'bold 10px Outfit';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(node.label.substring(0, 10), node.x, node.y + 15);
      });
    }

    // ==================== DRAG AND DROP ====================
    function setupDragDrop(container) {
      var cards = container.querySelectorAll('.task-card');

      cards.forEach(function(card) {
        card.addEventListener('dragstart', function(e) {
          appState.draggedTask = this.getAttribute('data-task-id');
          this.classList.add('dragging');
        });

        card.addEventListener('dragend', function(e) {
          this.classList.remove('dragging');
        });
      });

      container.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      });

      container.addEventListener('drop', function(e) {
        e.preventDefault();
        if (appState.draggedTask) {
          var column = this.parentElement.getAttribute('data-column');
          moveTask(appState.draggedTask, column);
          appState.draggedTask = null;
        }
      });
    }

    function moveTask(taskId, newColumn) {
      var task = appState.tasks.find(function(t) { return t.id === taskId; });
      if (task) {
        task.column = newColumn;
        sb.update('tasks', taskId, { column: newColumn }).then(function() {
          renderTasks();
        });
      }
    }

          html += '<div class="project-task-item">';
          html += '<div class="title">' + escapeHtml(t.title) + '</div>';
          html += '<span class="column-badge">' + escapeHtml(t.column) + '</span>';
          html += '</div>';
        });
        html += '</div>';
        html += '</div>';
      }

      html += '<div class="panel-section mt-1">';
      html += '<button class="btn btn-primary" onclick="openProjectModal(\'' + projectId + '\')">Edit Project</button>';
      html += '</div>';

      document.getElementById('panelContent').innerHTML = html;
      document.getElementById('detailPanel').classList.add('open');
      appState.currentProject = projectId;
    }

    document.getElementById('panelClose').addEventListener('click', function() {
      document.getElementById('detailPanel').classList.remove('open');
      appState.currentProject = null;
    });

    // ==================== TAB NAVIGATION ====================
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var tab = this.getAttribute('data-tab');
        appState.currentTab = tab;

        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');

        document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
        document.getElementById(tab + '-tab').classList.add('active');

        if (tab === 'archive') {
          renderArchive();
        } else if (tab === 'knowledge') {
          renderKnowledge();
        }
      });
    });

    // ==================== PROJECT FILTER ====================
    function updateProjectFilter() {
      var filter = document.getElementById('projectFilter');
      filter.innerHTML = '<option value="">All Projects</option>';
      appState.projects.forEach(function(p) {
        filter.innerHTML += '<option value="' + p.id + '">' + escapeHtml(p.name) + '</option>';
      });
    }

    document.getElementById('projectFilter').addEventListener('change', function(e) {
      appState.projectFilter = e.target.value;
      renderTasks();
    });

    // ==================== FAB BUTTON ====================
    document.getElementById('fab').addEventListener('click', function() {
      openTaskModal();
    });

    // ==================== UTILITY FUNCTION ====================
    function escapeHtml(text) {
      if (!text) return '';
      var map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    // ==================== INITIALIZATION ====================
    document.addEventListener('DOMContentLoaded', function() {
      initializeApp();
    });
  </script>
</body>
</html>
